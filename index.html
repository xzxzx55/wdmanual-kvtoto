<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PANEL WD INSTAN KVTOTO ⚡</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 900px) { .grid { grid-template-columns: 1fr 2fr; } }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); border: 1px solid #334155; }
        textarea { width: 100%; height: 200px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #fff; padding: 10px; box-sizing: border-box; font-size: 13px; }
        button { background: #0284c7; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #0369a1; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #334155; color: #94a3b8; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 14px; white-space: nowrap; }
        .tab-btn.active { background: #0284c7; color: white; }
        .tab-btn.ewallet-tab { border: 1px solid #ef4444; }
        .tab-btn.ewallet-tab.active { background: #ef4444; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #38bdf8; }
        .btn-done { background: #22c55e; padding: 4px 8px; font-size: 11px; border-radius: 4px; margin: 0; width: auto; display: inline-block; }
        .btn-done:hover { background: #16a34a; }
        tr.row-done { background-color: rgba(34, 197, 94, 0.15) !important; color: #4ade80; }
        tr.row-done .btn-done { display: none; }
        .badge { background: #ef4444; color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ PANEL WD INSTAN KVTOTO ⚡</h1>
    
    <div class="grid">
        <!-- INPUT ADMIN -->
        <div class="card">
            <h3>📥 Input Data Mentah (Admin)</h3>
            <p style="font-size: 12px; color: #94a3b8;">Paste data tabel dari web dashboard WD Anda di bawah ini:</p>
            <textarea id="rawData" placeholder="Contoh: yaannn Withdraw 2026-07-19..."></textarea>
            <button onclick="prosesData()">PROSES WD INSTAN</button>
        </div>
        
        <!-- DISPLAY DATA WORKER -->
        <div class="card">
            <div class="tabs" id="tabsHeaders">
                <div class="tab-btn active" onclick="switchTab('BCA')">BCA <span class="badge" id="b-BCA">0</span></div>
                <div class="tab-btn" onclick="switchTab('BRIBNI')">BRI & BNI <span class="badge" id="b-BRIBNI">0</span></div>
                <div class="tab-btn" onclick="switchTab('KECIL')">MANDIRI & KECIL <span class="badge" id="b-KECIL">0</span></div>
                <div class="tab-btn ewallet-tab" onclick="switchTab('EWALLET')">E-WALLET <span class="badge" id="b-EWALLET">0</span></div>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th width="40">NO</th>
                            <th>ID USER</th>
                            <th>WAKTU</th>
                            <th>NOMINAL</th>
                            <th>REKENING TUJUAN</th>
                            <th width="70">AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" style="text-align:center; color:#64748b;">Belum ada data diinput.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let currentTab = 'BCA';
let database = { BCA: [], BRIBNI: [], KECIL: [], EWALLET: [] };

function prosesData() {
    let rawText = document.getElementById("rawData").value.trim();
    if (!rawText) return alert("Paste data dulu, Bos!");

    database = { BCA: [], BRIBNI: [], KECIL: [], EWALLET: [] };
    let lines = rawText.split("\n");

    lines.forEach(line => {
        if (!line.trim()) return;
        let parts = line.split("\t");
        if (parts.length < 4) parts = line.split(/\s{2,}/);

        let id = "", tgl = "", nominal = "", rekText = "";
        let rekIdx = parts.findIndex(p => p.includes(","));

        if (rekIdx !== -1 && rekIdx >= 4) {
            rekText = parts[rekIdx].trim();
            nominal = parts[rekIdx - 2] ? parts[rekIdx - 2].trim() : "";
            tgl = parts[rekIdx - 3] ? parts[rekIdx - 3].trim() : "";
            id = parts[1] ? parts[1].replace("Withdraw", "").trim() : "";
        } else {
            for (let i = 0; i < parts.length; i++) {
                if (parts[i].includes(",")) rekText = parts[i].trim();
                if (parts[i].includes("-") && parts[i].includes(":")) tgl = parts[i].trim();
            }
            id = parts[1] ? parts[1].replace("Withdraw", "").trim() : "";
            nominal = parts[4] ? parts[4].trim() : "";
        }

        if (!id || !rekText) return;

        // Auto-fix typo EABANK -> SEABANK
        let bank = rekText.split(",")[0].trim().toUpperCase();
        if (bank === "EABANK") bank = "SEABANK";

        let dataObj = { id, tgl, nominal, rek: rekText, isDone: false };

        if (["DANA", "OVO", "GOPAY", "LINKAJA", "LINK AJA"].includes(bank)) {
            database.EWALLET.push(dataObj);
        } else if (bank === "BCA") {
            database.BCA.push(dataObj);
        } else if (bank === "BRI" || bank === "BNI") {
            database.BRIBNI.push(dataObj);
        } else {
            database.KECIL.push(dataObj);
        }
    });

    updateBadges();
    renderData();
    document.getElementById("rawData").value = ""; 
}

function renderData() {
    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    let items = database[currentTab];

    if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#64748b;">Tidak ada transaksi pending.</td></tr>`;
        return;
    }

    items.forEach((item, index) => {
        let tr = document.createElement("tr");
        if (item.isDone) tr.className = "row-done";

        tr.innerHTML = `
            <td>${index + 1}</td>
            <td style="font-weight:bold; color:#f8fafc;">${item.id}</td>
            <td style="color:#94a3b8;">${item.tgl}</td>
            <td style="color:#38bdf8; font-weight:bold;">${item.nominal}</td>
            <td>${item.rek}</td>
            <td><button class="btn-done" onclick="markDone(${index})">DONE</button></td>
        `;
        tbody.appendChild(tr);
    });
}

function markDone(index) {
    database[currentTab][index].isDone = true;
    renderData();
}

function switchTab(tabName) {
    currentTab = tabName;
    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
    event.currentTarget.classList.add("active");
    renderData();
}

function updateBadges() {
    document.getElementById("b-BCA").innerText = database.BCA.filter(x => !x.isDone).length;
    document.getElementById("b-BRIBNI").innerText = database.BRIBNI.filter(x => !x.isDone).length;
    document.getElementById("b-KECIL").innerText = database.KECIL.filter(x => !x.isDone).length;
    document.getElementById("b-EWALLET").innerText = database.EWALLET.filter(x => !x.isDone).length;
}
</script>
</body>
</html>
