<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard WD Manual</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 20px;
            color: #000;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        /* Bagian Atas / Header Pilihan Bank */
        .bank-filters {
            margin-bottom: 10px;
            font-size: 14px;
        }
        .bank-filters a {
            color: #0033cc;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }
        .bank-filters .btn-uncheck {
            background: #e1e1e1;
            border: 1px solid #adadad;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 10px;
        }

        /* Styling Tabel ala Excel / Dashboard */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background-color: #ffffff;
            color: #0033cc;
            text-align: left;
            padding: 8px;
            font-weight: normal;
            border-bottom: 1px solid #ccc;
        }
        th.sortable {
            text-decoration: underline;
            cursor: pointer;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #e0e0e0;
            vertical-align: top;
        }
        tr.row-even {
            background-color: #f2f2f2;
        }
        tr.row-odd {
            background-color: #ffffff;
        }
        tr.row-done {
            background-color: #d4edda !important; /* Hijau ketika di-Accept/Done */
        }
        
        /* Link & Teks Khusus */
        .user-link {
            color: #0033cc;
            text-decoration: underline;
            font-weight: bold;
            display: block;
        }
        .sub-text {
            color: #555;
            font-size: 11px;
            display: block;
        }
        .amount-text {
            color: #cc0000;
            font-weight: bold;
        }
        .currency-symbol {
            background: #aaa;
            color: #fff;
            border-radius: 50%;
            padding: 0 3px;
            font-size: 10px;
            margin-left: 5px;
            display: inline-block;
        }

        /* Panel Tombol Aksi di Bawah Tabel */
        .action-panel {
            background-color: #dbdbdb;
            padding: 10px;
            text-align: center;
            margin-top: -1px;
            border: 1px solid #ccc;
        }
        .btn-action {
            padding: 6px 24px;
            font-size: 13px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 5px;
            font-weight: bold;
        }
        .btn-accept {
            background-color: #4cae4c;
        }
        .btn-accept:hover {
            background-color: #449d44;
        }
        .btn-reject {
            background-color: #d9534f;
        }
        .btn-reject:hover {
            background-color: #c9302c;
        }

        /* Kotak Input untuk Admin Pasang Data Mentah */
        .admin-box {
            margin-top: 30px;
            padding: 15px;
            border: 1px dashed #aaa;
            background-color: #fafafa;
        }
        .admin-box textarea {
            width: 100%;
            height: 80px;
            margin-top: 5px;
        }
        .btn-proses {
            margin-top: 5px;
            padding: 5px 15px;
            background-color: #0033cc;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Menu Atas Bank -->
    <div class="bank-filters">
        <button class="btn-uncheck" onclick="toggleAllCheckboxes(false)">Un/check All</button>
        <input type="checkbox" id="chk-bri" checked> <a href="#" onclick="filterBank('BRI')">BRI [<span id="count-bri">0</span>]</a>
        <input type="checkbox" id="chk-dana" checked> <a href="#" onclick="filterBank('DANA')">DANA [<span id="count-dana">0</span>]</a>
    </div>

    <!-- Tabel Data -->
    <table id="wd-table">
        <thead>
            <tr>
                <th style="width: 40px;">No <input type="checkbox" id="select-all-rows" onclick="selectAllRows(this)"></th>
                <th class="sortable">User</th>
                <th class="sortable">Date</th>
                <th class="sortable">Amount</th>
                <th class="sortable">Balance</th>
                <th>Bank Asal</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- Data Masuk Di Sini -->
        </tbody>
    </table>

    <!-- Tombol Aksi di Bawah ala Dashboard -->
    <div class="action-panel">
        <button class="btn-action btn-accept" onclick="processSelected('DONE')">Accept</button>
        <button class="btn-action btn-reject" onclick="processSelected('REJECT')">Reject</button>
    </div>

    <!-- Kotak Tersembunyi/Bawah untuk Anda input data mentah -->
    <div class="admin-box">
        <strong>Panel Input Data Mentah (Admin):</strong><br>
        <textarea id="raw-input" placeholder="Paste data tabel dari web dashboard WD Anda di sini..."></textarea><br>
        <button class="btn-proses" onclick="importRawData()">PROSES DATA</button>
    </div>
</div>

<script>
    let databaseWD = [];

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        let briCount = 0;
        let danaCount = 0;

        databaseWD.forEach((item, index) => {
            // Hitung statistik di atas
            if (item.bankName === 'BRI') briCount++;
            if (item.bankName === 'DANA') danaCount++;

            const rowClass = item.status === 'DONE' ? 'row-done' : (index % 2 === 0 ? 'row-even' : 'row-odd');
            
            const tr = document.createElement('tr');
            tr.className = rowClass;
            tr.innerHTML = `
                <td>${index + 1} <input type="checkbox" class="row-check" data-id="${item.id}"></td>
                <td>
                    <a href="#" class="user-link">${item.username}</a>
                    <span class="sub-text">Withdraw</span>
                </td>
                <td>${item.waktu}</td>
                <td><span class="amount-text">${item.nominal}</span> <span class="currency-symbol">G</span></td>
                <td>
                    <span style="color:#0055aa; font-weight:bold;">${item.saldo}</span>
                    <span class="sub-text" style="color:green; font-weight:bold;">G1</span>
                </td>
                <td>${item.rekeningTujuan}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('count-bri').innerText = briCount;
        document.getElementById('count-dana').innerText = danaCount;
    }

    function importRawData() {
        const rawText = document.getElementById('raw-input').value.trim();
        if(!rawText) return;

        const lines = rawText.split('\n');
        
        lines.forEach(line => {
            const cols = line.split('\t');
            if(cols.length >= 5) {
                let username = cols[0] ? cols[0].replace('Withdraw', '').trim() : 'User';
                let waktu = cols[1] || '';
                let nominal = cols[2] || '0';
                let saldo = cols[3] || '0';
                let rekeningTujuan = cols[4] || '';

                let bankName = "LAINNYA";
                if(rekeningTujuan.toUpperCase().includes("BRI")) bankName = "BRI";
                if(rekeningTujuan.toUpperCase().includes("DANA")) bankName = "DANA";

                databaseWD.push({
                    id: 'id_' + Math.random().toString(36).substr(2, 9),
                    username: username,
                    waktu: waktu,
                    nominal: nominal,
                    saldo: saldo,
                    rekeningTujuan: rekeningTujuan,
                    bankName: bankName,
                    status: 'PENDING'
                });
            }
        });

        document.getElementById('raw-input').value = '';
        renderTable();
    }

    function processSelected(actionType) {
        const checkboxes = document.querySelectorAll('.row-check:checked');
        checkboxes.forEach(cb => {
            const id = cb.getAttribute('data-id');
            const dataItem = databaseWD.find(item => item.id === id);
            if(dataItem) {
                if(actionType === 'DONE') {
                    dataItem.status = 'DONE'; // Ubah jadi hijau
                } else {
                    // Jika reject, hapus atau beri tanda khusus
                    databaseWD = databaseWD.filter(item => item.id !== id);
                }
            }
        });
        document.getElementById('select-all-rows').checked = false;
        renderTable();
    }

    function selectAllRows(master) {
        const checkboxes = document.querySelectorAll('.row-check');
        checkboxes.forEach(cb => cb.checked = master.checked);
    }

    function toggleAllCheckboxes(status) {
        document.getElementById('chk-bri').checked = status;
        document.getElementById('chk-dana').checked = status;
    }
</script>

</body>
</html>
