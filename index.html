<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sheets - WD Manual</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; margin: 10px; font-size: 13px; color: #000; }
        
        /* Layout Grid Atas Eksklusif Excel */
        .excel-header-grid { display: flex; width: 100%; border: 1px solid #ccc; margin-bottom: 5px; }
        .cell-seabank { flex: 3; background-color: #00ffff; color: #000; font-weight: bold; font-size: 22px; text-align: center; padding: 15px 0; border-right: 2px solid #000; letter-spacing: 2px; }
        .cell-proses-btn { flex: 1; background-color: #ff0000; color: #000; font-weight: bold; font-size: 16px; text-align: center; padding: 18px 0; cursor: pointer; border-right: 2px solid #000; border-bottom: 2px solid #000; text-transform: uppercase; }
        .cell-proses-btn:hover { background-color: #cc0000; }
        .cell-nominal-wd { flex: 1; background-color: #00ffff; font-weight: bold; font-size: 16px; text-align: center; padding: 18px 0; border-right: 1px solid #ccc; }
        .cell-nominal-tf { flex: 1; background-color: #00ff00; font-weight: bold; font-size: 14px; text-align: center; padding: 18px 0; }

        /* Tab Bawah Excel Style */
        .excel-tabs { display: flex; background-color: #f3f3f3; border: 1px solid #ccc; border-bottom: none; }
        .excel-tab { padding: 8px 15px; cursor: pointer; border-right: 1px solid #ccc; background: #e4e4e4; font-weight: bold; color: #555; font-size: 12px; }
        .excel-tab.active { background: #fff; color: #0055ff; border-top: 3px solid #0055ff; margin-top: -3px; border-bottom: 1px solid #fff; }

        /* Tabel Utama ala Kotak-Kotak Excel */
        .excel-table-container { border: 1px solid #ccc; overflow-x: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; }
        
        /* Baris Judul Kolom (Kuning) */
        th { background-color: #ffff00; color: #000; font-weight: bold; border: 1px solid #000; text-align: center; padding: 6px; font-size: 13px; }
        
        /* Baris Tanggal (Hijau) */
        .row-date-header td { background-color: #00ff00; color: #000; text-align: center; font-weight: bold; font-size: 11px; padding: 3px; border: 1px solid #000; letter-spacing: 2px; }
        
        td { border: 1px solid #ccc; padding: 6px; vertical-align: middle; height: 25px; }
        
        /* Kolom Khusus Alignment */
        .col-center { text-align: center; }
        .col-right { text-align: right; }
        
        /* Pewarnaan Data Awal (Pink Lembut ala Excel Anda) */
        .row-data-wd { background-color: #fce4d6; }
        .row-done { background-color: #d4edda !important; color: #155724; } /* Berubah hijau kalau DONE */
        
        .user-link { color: #0033cc; text-decoration: underline; font-weight: bold; display: block; }
        .amount-text { color: #ff0000; font-weight: bold; }
        
        /* Input Data Mentah Box */
        .input-area-box { margin-top: 20px; border: 1px dashed #777; padding: 10px; background: #fafafa; }
        .input-area-box textarea { width: 100%; height: 60px; box-sizing: border-box; font-family: monospace; font-size: 12px; }

        .btn-done-trigger { background: #fff; border: 1px solid #aaa; padding: 2px 8px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 3px; }
        .btn-done-trigger:hover { background: #e1e1e1; }
    </style>
</head>
<body>

<div style="max-width: 100%; margin: 0 auto;">

    <!-- 1. BLOCK PANEL UTAMA ATAS (Eksklusif Excel Look) -->
    <div class="excel-header-grid">
        <div class="cell-seabank">SEABANK</div>
        <div class="cell-proses-btn" onclick="prosesDataExcel()">PROSES DATA WD</div>
        <div class="cell-nominal-wd">-2,500</div>
        <div class="cell-nominal-tf">Nominal WD<br>Nominal TF</div>
    </div>

    <!-- 2. TAB MENU BAWAH EXCEL -->
    <div class="excel-tabs">
        <div class="excel-tab active" id="tab-COPY" onclick="gantiTab('COPY')">BUAT COPY</div>
        <div class="excel-tab" id="tab-BCA" onclick="gantiTab('BCA')">BCA</div>
        <div class="excel-tab" id="tab-BRIBNI" onclick="gantiTab('BRIBNI')">BRI & BNI</div>
        <div class="excel-tab" id="tab-KECIL" onclick="gantiTab('KECIL')">MANDIRI & BANK KECIL</div>
    </div>

    <!-- 3. TABEL KOTAK EXCEL -->
    <div class="excel-table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">NO</th>
                    <th style="width: 120px;">ID</th>
                    <th style="width: 160px;">TGL</th>
                    <th style="width: 120px;">NOMINAL</th>
                    <th>NAMA REKENING</th>
                    <th style="width: 120px;">KETERANGAN</th>
                </tr>
                <tr class="row-date-header">
                    <td colspan="6">TANGGAL</td>
                </tr>
            </thead>
            <tbody id="excel-rows">
                <!-- Baris kosong default ala excel -->
                <script>
                    for(let i=1; i<=15; i++) {
                        document.write(`<tr><td class="col-center" style="color:#999;">${i}</td><td></td><td></td><td></td><td></td><td></td></tr>`);
                    }
                </script>
            </tbody>
        </table>
    </div>

    <!-- 4. BOX ADMIN INPUT DATA MENTAH DARI WEB -->
    <div class="input-area-box">
        <strong>Tempel / Paste Form Data Mentah Web Dashboard di Sini:</strong>
        <textarea id="raw-paste" placeholder="Paste data tabel WD di sini lalu klik tombol merah PROSES DATA WD di atas..."></textarea>
    </div>

</div>

<script>
    let currentActiveTab = 'COPY';
    let dataMaster = { COPY: [], BCA: [], BRIBNI: [], KECIL: [] };

    function renderExcelTable() {
        const tbody = document.getElementById('excel-rows');
        tbody.innerHTML = '';
        
        let listData = dataMaster[currentActiveTab];

        // Tampilkan data yang ada
        listData.forEach((item, index) => {
            const isDoneRow = item.keterangan.toUpperCase() === 'DONE';
            const rowClass = isDoneRow ? 'row-done' : (currentActiveTab === 'COPY' ? 'row-data-wd' : '');
            
            const tr = document.createElement('tr');
            tr.className = rowClass;
            
            // Kolom Keterangan: Kalau di Tab Bank, tampilkan tombol "DONE" untuk worker klik
            let kolomKet = item.keterangan;
            if (currentActiveTab !== 'COPY' && !isDoneRow) {
                kolomKet = `<button class="btn-done-trigger" onclick="setRowDone(${index})">DONE</button>`;
            }

            tr.innerHTML = `
                <td class="col-center">${index + 1}</td>
                <td class="col-center">
                    <span class="user-link">${item.idUser}</span>
                    <span style="color:#0033cc; font-size:11px; text-decoration:underline;">Withdraw</span>
                </td>
                <td class="col-center">${item.tgl}</td>
                <td class="col-center amount-text">${item.nominal}</td>
                <td>${item.namaRekening}</td>
                <td class="col-center">${kolomKet}</td>
            `;
            tbody.appendChild(tr);
        });

        // Tambahkan sisa baris kosong agar estetika grid Excel tetap terjaga
        let sisaBaris = 15 - listData.length;
        for (let i = 0; i < sisaBaris; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="col-center" style="color:#999;">${listData.length + i + 1}</td><td></td><td></td><td></td><td></td><td></td>`;
            tbody.appendChild(tr);
        }
    }

    function prosesDataExcel() {
        const rawText = document.getElementById('raw-paste').value.trim();
        if (!rawText) return alert("Tempel data form-nya dulu di kotak bawah, Bos!");

        const lines = rawText.split('\n');
        
        lines.forEach(line => {
            if (!line.trim()) return;
            let parts = line.split('\t');
            if (parts.length < 4) parts = line.split(/\s{2,}/);

            let idUser = "", tgl = "", nominal = "", namaRekening = "";
            let rekIdx = parts.findIndex(p => p.includes(","));

            if (rekIdx !== -1 && rekIdx >= 4) {
                namaRekening = parts[rekIdx].trim();
                nominal = parts[rekIdx - 2] ? parts[rekIdx - 2].trim() : "";
                tgl = parts[rekIdx - 3] ? parts[rekIdx - 3].trim() : "";
                idUser = parts[1] ? parts[1].replace("Withdraw", "").trim() : "";
            } else {
                for (let i = 0; i < parts.length; i++) {
                    if (parts[i].includes(",")) namaRekening = parts[i].trim();
                    if (parts[i].includes("-") && parts[i].includes(":")) tgl = parts[i].trim();
                }
                idUser = parts[1] ? parts[1].replace("Withdraw", "").trim() : "";
                nominal = parts[4] ? parts[4].trim() : "";
            }

            if (!idUser || !namaRekening) return;

            // Auto-fix typo bank
            let bank = namaRekening.split(",")[0].trim().toUpperCase();
            if (bank === "EABANK") bank = "SEABANK";

            let itemObj = { idUser, tgl, nominal, namaRekening, keterangan: "" };

            // Pilah otomatis masuk ke list bank masing-masing di memori
            if (["DANA", "OVO", "GOPAY", "LINKAJA"].includes(bank)) {
                dataMaster.COPY.push(itemObj); // E-Wallet tetap di BUAT COPY sesuai sistem lama
            } else if (bank === "BCA") {
                dataMaster.BCA.push(itemObj);
            } else if (bank === "BRI" || bank === "BNI") {
                dataMaster.BRIBNI.push(itemObj);
            } else {
                dataMaster.KECIL.push(itemObj);
            }
        });

        document.getElementById('raw-paste').value = '';
        renderExcelTable();
        alert("Data berhasil dipilah ke masing-masing Form Bank, Bos!");
    }

    function setRowDone(index) {
        dataMaster[currentActiveTab][index].keterangan = 'DONE';
        renderExcelTable();
    }

    function gantiTab(tabName) {
        currentActiveTab = tabName;
        document.querySelectorAll('.excel-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tabName).classList.add('active');
        renderExcelTable();
    }
</script>

</body>
</html>
